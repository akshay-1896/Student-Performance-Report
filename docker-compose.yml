# ============================================================
# Docker Compose for Student Performance Predictor
# ============================================================

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_performance_predictor
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URL=${MONGODB_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./data:/app/data
      - ./artifact:/app/artifact
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: MongoDB service for local development
  # mongodb:
  #   image: mongo:6.0
  #   container_name: student_mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #   restart: unless-stopped

volumes:
  # mongodb_data:
  #   driver: local

networks:
  default:
    name: student_performance_network